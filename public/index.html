<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Blackjack With Me</title>

<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0B3D2E" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --felt-dark:#0B3D2E;
    --felt-light:#145C3E;
    --felt-edge:#0A2E23;
    --gold:#C9A227;
    --gold-soft:#E4C767;
    --cream:#F3E9D2;
    --card-white:#FBF8F2;
    --red-suit:#A63D40;
    --ink:#1B1B1B;
    --shadow:rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse at top, var(--felt-light) 0%, var(--felt-dark) 55%, var(--felt-edge) 100%);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior:none;
  }
  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding:env(safe-area-inset-top,16px) 16px 0;
  }
  #app.has-action-bar{
    padding-bottom: calc(env(safe-area-inset-bottom,16px) + 108px);
  }
  h1,h2,h3{font-family:'Fraunces',serif; margin:0; font-weight:600;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    text-transform:uppercase;
    letter-spacing:.14em;
    font-size:11px;
    color:var(--gold-soft);
    opacity:.85;
  }

  /* ---------- Lobby ---------- */
  .lobby-wrap{flex:1; display:flex; flex-direction:column; justify-content:center; gap:20px;}
  .brand{text-align:center; margin-bottom:8px;}
  .brand .chip-mark{
    width:56px;height:56px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--gold-soft), var(--gold) 60%, #9c7d1a 100%);
    margin:0 auto 14px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif; font-weight:700; color:var(--felt-dark); font-size:20px;
    box-shadow:0 6px 18px var(--shadow), inset 0 0 0 3px rgba(255,255,255,.25);
  }
  .brand h1{font-size:28px; letter-spacing:.01em;}
  .brand p{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--cream); opacity:.6; margin-top:6px;}

  .panel{
    background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
    border:1px solid rgba(228,199,103,.22);
    border-radius:18px;
    padding:20px;
  }
  .panel + .panel{margin-top:14px;}
  .field{margin-bottom:14px;}
  .field label{
    display:block; font-family:'IBM Plex Mono',monospace; font-size:11px;
    text-transform:uppercase; letter-spacing:.1em; color:var(--gold-soft); margin-bottom:6px;
  }
  input[type=text], select{
    width:100%; padding:12px 14px; border-radius:10px; border:1px solid rgba(243,233,210,.25);
    background:rgba(0,0,0,.2); color:var(--cream); font-family:'Inter'; font-size:16px;
  }
  input[type=text]::placeholder{color:rgba(243,233,210,.4);}
  input:focus, select:focus{outline:2px solid var(--gold); outline-offset:1px;}

  .btn{
    width:100%; padding:13px 16px; border-radius:10px; border:none; cursor:pointer;
    font-family:'Inter'; font-weight:600; font-size:15px; letter-spacing:.01em;
    transition:transform .08s ease;
  }
  .btn:active{transform:scale(.98);}
  .btn-gold{background:linear-gradient(180deg, var(--gold-soft), var(--gold)); color:var(--felt-dark);}
  .btn-ghost{background:transparent; border:1px solid rgba(243,233,210,.3); color:var(--cream);}
  .btn:disabled{opacity:.45; cursor:not-allowed;}
  .error-text{color:#E8908F; font-size:13px; margin-top:8px; font-family:'IBM Plex Mono',monospace;}

  /* ---------- Table header ---------- */
  .table-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 2px 16px;
  }
  .room-code{font-family:'IBM Plex Mono',monospace; letter-spacing:.12em; font-size:15px; color:var(--gold-soft);}
  .banker-badge{
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.06em;
    background:rgba(201,162,39,.16); border:1px solid rgba(201,162,39,.4);
    padding:5px 10px; border-radius:999px; color:var(--gold-soft);
  }

  /* ---------- Table felt ---------- */
  .felt{
    flex:1; display:flex; flex-direction:column; gap:22px;
    border:1px solid rgba(228,199,103,.18);
    border-radius:22px;
    background:radial-gradient(ellipse at 50% 0%, rgba(228,199,103,.06), transparent 60%);
    padding:20px 16px;
    position:relative;
  }
  .seat-label{font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:rgba(243,233,210,.55); margin-bottom:8px;}
  .banker-seat{text-align:center;}
  .hand{display:flex; justify-content:center; gap:-8px; flex-wrap:wrap; min-height:78px; perspective:400px;}
  .hand-score{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--gold-soft); margin-top:6px; text-align:center;}

  .player-seat.compact .card{width:36px; height:50px; font-size:12px;}
  .player-seat.compact .card .suit{font-size:13px;}
  .player-seat.compact .player-name{font-size:12px;}
  .player-seat.compact .player-balance{font-size:11px;}

  .card{
    width:46px; height:64px; border-radius:7px; background:var(--card-white);
    box-shadow:0 3px 8px var(--shadow);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:15px; color:var(--ink);
    margin-left:-10px;
    border:1px solid rgba(0,0,0,.08);
  }
  .card:first-child{margin-left:0;}
  .card.red{color:var(--red-suit);}
  .card .suit{font-size:16px; line-height:1;}
  /* Only cards flagged as newly-dealt animate — a full re-render happens on
     every table update (e.g. another player hitting), so without this every
     card would replay the animation each time, not just the new one. */
  .card.card-deal{ animation:dealFlip .38s ease-out backwards; }
  @keyframes dealFlip{
    from{ transform:translateY(-16px) scale(.8) rotateY(90deg); opacity:0; }
    to{ transform:none; opacity:1; }
  }

  .players-row{
    display:flex; flex-direction:column; gap:16px;
  }
  .players-arc{
    position:relative;
  }
  .player-seat{
    background:rgba(0,0,0,.15);
    border:1px solid rgba(243,233,210,.12);
    border-radius:14px; padding:12px;
  }
  .players-arc .player-seat{
    position:absolute; transform:translateX(-50%); width:150px;
  }
  .players-arc .player-seat.compact{ width:112px; }
  .player-seat.active-turn{border-color:var(--gold); box-shadow:0 0 0 1px var(--gold);}
  .player-seat-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; gap:8px;}
  .player-name{font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .player-balance{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--gold-soft); white-space:nowrap;}
  .player-status{font-family:'IBM Plex Mono',monospace; font-size:11px; color:rgba(243,233,210,.55); text-transform:uppercase; letter-spacing:.06em;}

  .sub-hand{padding:6px 0;}
  .sub-hand + .sub-hand{border-top:1px dashed rgba(243,233,210,.15); margin-top:6px;}
  .sub-hand.active-hand{background:rgba(201,162,39,.08); border-radius:8px; margin:0 -6px; padding:6px;}
  .sub-hand-label{font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--gold-soft); margin-bottom:4px; text-align:center;}

  /* ---------- Chip selector ---------- */
  .chip-row{display:flex; justify-content:center; gap:12px; margin:6px 0 16px;}
  .chip{
    width:56px; height:56px; border-radius:50%; cursor:pointer; position:relative;
    background:repeating-conic-gradient(var(--felt-dark) 0deg 20deg, var(--gold) 20deg 40deg);
    display:flex; align-items:center; justify-content:center;
    border:none; padding:0;
    transition:transform .12s ease;
  }
  .chip .chip-inner{
    width:40px; height:40px; border-radius:50%; background:var(--felt-dark);
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--cream); font-size:13px;
    border:2px solid rgba(243,233,210,.5);
  }
  .chip.selected{transform:translateY(-8px);}
  .chip.selected .chip-inner{background:var(--gold); color:var(--felt-dark); border-color:var(--felt-dark);}

  /* ---------- Action dock (fixed to bottom, always reachable) ---------- */
  .action-dock{
    position:fixed; left:50%; transform:translateX(-50%); bottom:0;
    width:100%; max-width:520px;
    background:linear-gradient(180deg, transparent 0%, var(--felt-edge) 28%);
    padding:18px 16px calc(env(safe-area-inset-bottom,16px) + 14px);
    z-index:40;
  }
  .action-bar{
    display:flex; gap:10px;
  }
  .action-bar .btn{flex:1;}
  .btn-stand{background:rgba(243,233,210,.9); color:var(--felt-dark);}
  .btn-hit{background:linear-gradient(180deg, var(--gold-soft), var(--gold)); color:var(--felt-dark);}
  .action-bar-secondary{display:flex; gap:8px; margin-bottom:8px;}
  .action-bar-secondary .btn{flex:1;}
  .btn-sm{padding:9px 10px; font-size:13px;}

  .waiting-note{
    text-align:center; font-family:'IBM Plex Mono',monospace; font-size:12px;
    color:rgba(243,233,210,.55); padding:14px 0;
  }

  .turn-timer{
    text-align:center; font-family:'IBM Plex Mono',monospace; font-size:12px;
    color:var(--gold-soft); margin-bottom:10px; letter-spacing:.06em;
  }
  .turn-timer.urgent{color:#E8908F;}

  .toast{
    position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom,16px) + 128px); transform:translateX(-50%);
    background:var(--felt-light); border:1px solid var(--gold); color:var(--cream);
    padding:12px 18px; border-radius:12px; font-family:'IBM Plex Mono',monospace; font-size:13px;
    box-shadow:0 8px 24px var(--shadow); max-width:90%; text-align:center; z-index:50;
  }

  .copy-row{display:flex; gap:8px; align-items:center; justify-content:center; margin-top:4px;}
  .copy-row .code-big{font-family:'IBM Plex Mono',monospace; font-size:26px; letter-spacing:.2em; color:var(--gold-soft);}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
(function(){
  const socket = io(); // same-origin — server serves this file, so no URL needed
  const app = document.getElementById('app');

  // Persistent player identity — survives reconnects (wifi/cellular switches,
  // backgrounding the app) and page reloads, unlike socket.id which changes
  // every time the connection drops.
  function getToken(){
    let t = localStorage.getItem('bjwm_token');
    if(!t){
      t = 'p_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('bjwm_token', t);
    }
    return t;
  }
  const myId = getToken(); // "myId" throughout this file now means "my player token"

  let room = null;
  let lastAckedResults = null;
  let toastTimer = null;
  let selectedChip = null;
  let joinError = '';
  let lastPhase = null;         // detects the moment a fresh round's cards land, so we know to reset the diff below
  let lastCardCounts = {};      // key ('banker' or 'token:handIndex') -> card count last render, for new-card detection

  // If we were already in a room (saved from a previous connection or page
  // load), silently rejoin as soon as we connect — this is what makes a
  // dropped wifi/cellular connection recover instead of stranding the player.
  socket.on('connect', () => {
    const savedRoom = localStorage.getItem('bjwm_room');
    const savedName = localStorage.getItem('bjwm_name');
    if (savedRoom && savedName) {
      socket.emit('join_room', { code: savedRoom, name: savedName, token: myId }, (res) => {
        if(!res.ok){
          // Room's gone (server restarted, or it never existed) — clear stale state.
          localStorage.removeItem('bjwm_room');
          room = null;
          render();
        }
      });
    } else {
      render();
    }
  });
  socket.on('room_state', (r) => {
    room = r;
    if (room.lastResults && room.lastResults !== lastAckedResults) {
      showToastFromResults();
      lastAckedResults = room.lastResults;
    }
    render();
  });

  function showToastFromResults(){
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { render(); }, 4500);
  }

  const SUITS = { hearts:'♥', diamonds:'♦', clubs:'♣', spades:'♠' };
  const RED = { hearts:true, diamonds:true };

  function cardEl(card, isNew, staggerIndex){
    const red = RED[card.suit];
    const cls = isNew ? `card-deal` : '';
    const style = isNew ? ` style="animation-delay:${staggerIndex*90}ms"` : '';
    return `<div class="card ${red ? 'red':''} ${cls}"${style}><div>${card.rank}</div><div class="suit">${SUITS[card.suit]}</div></div>`;
  }

  // Renders a hand's cards, animating only the ones that weren't there last
  // render (tracked by `key`) — otherwise every table update (e.g. someone
  // else hitting) would replay the deal animation on every card, every time.
  function handCardsHtml(key, cards, nextCounts){
    const priorCount = lastCardCounts[key] || 0;
    nextCounts[key] = cards.length;
    return cards.map((c, i) => cardEl(c, i >= priorCount, i - priorCount)).join('');
  }

  function scoreOf(hand){
    if(!hand || !hand.length) return 0;
    let total=0, aces=0;
    for(const c of hand){
      if(c.rank==='A'){ total+=11; aces++; }
      else if(['J','Q','K'].includes(c.rank)) total+=10;
      else total+=parseInt(c.rank,10);
    }
    while(total>21 && aces>0){ total-=10; aces--; }
    return total;
  }

  function cardBaseValue(card){
    if(card.rank === 'A') return 11;
    if(['J','Q','K'].includes(card.rank)) return 10;
    return parseInt(card.rank,10);
  }

  // ---------------- Lobby ----------------
  function renderLobby(){
    app.classList.remove('has-action-bar');
    app.innerHTML = `
      <div class="lobby-wrap">
        <div class="brand">
          <div class="chip-mark">21</div>
          <h1>Blackjack With Me</h1>
          <p>ONE TABLE · YOUR FRIENDS · NO CHIPS TO COUNT</p>
        </div>

        <div class="panel">
          <h3 style="margin-bottom:14px; font-size:17px;">Start a table</h3>
          <div class="field">
            <label>Your name</label>
            <input type="text" id="createName" placeholder="e.g. Chester" maxlength="20" />
          </div>
          <div class="field">
            <label>Rounds per banker rotation</label>
            <select id="roundsPerBanker">
              <option value="5">5 rounds</option>
              <option value="10" selected>10 rounds</option>
              <option value="15">15 rounds</option>
              <option value="20">20 rounds</option>
            </select>
          </div>
          <button class="btn btn-gold" id="createBtn">Create room</button>
        </div>

        <div class="panel">
          <h3 style="margin-bottom:14px; font-size:17px;">Join a table</h3>
          <div class="field">
            <label>Your name</label>
            <input type="text" id="joinName" placeholder="e.g. Ray" maxlength="20" />
          </div>
          <div class="field">
            <label>Room code</label>
            <input type="text" id="joinCode" placeholder="e.g. K3F9M" maxlength="6" style="text-transform:uppercase;" />
          </div>
          <button class="btn btn-ghost" id="joinBtn">Join room</button>
          ${joinError ? `<div class="error-text">${joinError}</div>` : ''}
        </div>
      </div>
    `;

    document.getElementById('createBtn').onclick = () => {
      const name = document.getElementById('createName').value.trim() || 'Banker';
      const rpb = parseInt(document.getElementById('roundsPerBanker').value, 10);
      socket.emit('create_room', { name, roundsPerBanker: rpb, token: myId }, (res) => {
        if(!res.ok){ joinError = res.error || 'Could not create room'; render(); return; }
        localStorage.setItem('bjwm_room', res.code);
        localStorage.setItem('bjwm_name', name);
      });
    };
    document.getElementById('joinBtn').onclick = () => {
      const name = document.getElementById('joinName').value.trim() || 'Player';
      const code = document.getElementById('joinCode').value.trim().toUpperCase();
      if(!code){ joinError = 'Enter a room code'; render(); return; }
      socket.emit('join_room', { code, name, token: myId }, (res) => {
        if(!res.ok){ joinError = res.error || 'Could not join room'; render(); return; }
        joinError = '';
        localStorage.setItem('bjwm_room', code);
        localStorage.setItem('bjwm_name', name);
      });
    };
  }

  // ---------------- Table ----------------
  function arcSeatStyle(i, total){
    const t = total <= 1 ? 0 : (i / (total - 1)) * 2 - 1; // -1 (left) .. 1 (right)
    const leftPct = 50 + t * 38;      // spread across ~76% of the felt's width
    const curveDepth = 46;            // px the middle seat dips below the edges — classic "front edge of the table" bow
    const topPx = curveDepth * (1 - t * t);
    return `left:${leftPct}%; top:${topPx}px;`;
  }

  function renderTable(){
    ensureCountdownTicking();
    const bankerId = room.turnOrder[room.bankerIndex];
    const iAmBanker = myId === bankerId;
    const bankerName = room.players[bankerId] ? room.players[bankerId].name : '—';
    const others = room.turnOrder.filter(id => id !== bankerId);

    // A fresh round's initial cards just landed the moment we leave 'betting'
    // for the first time — reset the new-card tracker so those first two
    // cards animate in, instead of being mistaken for cards we'd already seen.
    if(lastPhase === 'betting' && room.phase !== 'betting'){
      lastCardCounts = {};
    }
    lastPhase = room.phase;
    const nextCardCounts = {};

    const bankerHand = room.hands.banker || [];
    const showBankerScore = bankerHand.length > 0;
    const bankerCardsHtml = handCardsHtml('banker', bankerHand, nextCardCounts);

    const roundsLeft = room.roundsPerBanker - (room.roundCount % room.roundsPerBanker);

    const compactClass = others.length >= 4 ? 'compact' : '';

    let playersHtml = others.map((pid, i) => {
      const p = room.players[pid];
      const handsArr = (room.hands && room.hands[pid]) || []; // array of {cards,bet,standing,doubled,fromSplit}
      const isMyTurnPlayer = room.phase === 'player_turns' && room.currentTurn === pid;
      const activeIdx = room.activeHandIndex ? room.activeHandIndex[pid] : undefined;

      let betStatus = '';
      if(room.phase === 'betting'){
        betStatus = room.bets[pid] !== undefined ? `Bet $${room.bets[pid]}` : 'Waiting for bet…';
      }

      const handsHtml = handsArr.map((h, idx) => {
        const isActiveHand = isMyTurnPlayer && activeIdx === idx;
        let status = '';
        if(h.standing) status = scoreOf(h.cards) > 21 ? 'Bust' : (h.autoStood ? 'Timed out · stood' : (h.doubled ? 'Doubled · stood' : 'Stood'));
        else if(isActiveHand) status = 'Your move';
        else status = 'Playing…';
        const key = `${pid}:${idx}`;
        return `
          <div class="sub-hand ${isActiveHand ? 'active-hand':''}">
            ${handsArr.length > 1 ? `<div class="sub-hand-label">Hand ${idx+1} · $${h.bet}</div>` : ''}
            <div class="hand">${handCardsHtml(key, h.cards, nextCardCounts)}</div>
            <div class="hand-score">${scoreOf(h.cards)}</div>
            <div class="player-status">${status}</div>
          </div>
        `;
      }).join('');

      return `
        <div class="player-seat ${compactClass} ${isMyTurnPlayer ? 'active-turn':''}" style="${arcSeatStyle(i, others.length)}">
          <div class="player-seat-top">
            <span class="player-name">${p.name}${pid===myId ? ' (you)':''}</span>
            <span class="player-balance">${p.balance>=0?'+':''}$${p.balance.toFixed(2)}</span>
          </div>
          ${handsHtml || `<div class="player-status">${betStatus}</div>`}
        </div>
      `;
    }).join('');

    lastCardCounts = nextCardCounts;

    app.classList.add('has-action-bar');
    app.innerHTML = `
      <div class="table-header">
        <div>
          <div class="eyebrow">Room</div>
          <div class="room-code">${room.code}</div>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
          <div class="banker-badge">🎩 Banker: ${bankerName}${iAmBanker ? ' (you)':''} · ${roundsLeft} left</div>
          <button id="leaveBtn" title="Leave table" style="background:none;border:none;color:rgba(243,233,210,.5);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;padding:4px;">✕</button>
        </div>
      </div>

      <div class="felt">
        <div class="banker-seat">
          <div class="seat-label">Banker's hand</div>
          <div class="hand" style="justify-content:center;">${bankerCardsHtml}</div>
          ${showBankerScore ? `<div class="hand-score">${scoreOf(bankerHand)}</div>` : ''}
        </div>

        <div class="players-arc" style="min-height:${others.length ? (compactClass ? 200 : 240) : 0}px;">
          ${playersHtml || '<div class="waiting-note">Waiting for players to join…</div>'}
        </div>
      </div>

      <div class="action-dock">${renderActionArea(iAmBanker)}</div>
      ${renderToast()}
    `;

    wireActionArea(iAmBanker);

    const leaveBtn = document.getElementById('leaveBtn');
    if(leaveBtn){
      leaveBtn.onclick = () => {
        if(!confirm('Leave this table? Your balance stays as-is if you rejoin with the code later.')) return;
        localStorage.removeItem('bjwm_room');
        localStorage.removeItem('bjwm_name');
        room = null;
        render();
      };
    }
  }

  function remainingSeconds(){
    if(!room || !room.turnDeadline) return null;
    return Math.max(0, Math.ceil((room.turnDeadline - Date.now())/1000));
  }

  let countdownInterval = null;
  function ensureCountdownTicking(){
    if(countdownInterval) return;
    countdownInterval = setInterval(() => {
      if(room && room.turnDeadline && room.phase === 'player_turns'){
        updateTimerDisplay();
      } else {
        clearInterval(countdownInterval);
        countdownInterval = null;
      }
    }, 1000);
  }

  // Patches just the countdown text/color in place — a full render() every
  // second was rebuilding the card DOM too, which retriggered the "deal"
  // animation and made the cards visibly flicker each tick.
  function updateTimerDisplay(){
    const secs = remainingSeconds();
    if(secs === null) return;
    const badge = document.getElementById('turnTimerBadge');
    if(badge){
      badge.textContent = `⏱ ${secs}s to act`;
      badge.classList.toggle('urgent', secs <= 5);
    }
    const waitVal = document.getElementById('waitingCountdownVal');
    if(waitVal){ waitVal.textContent = secs; }
  }

  function renderActionArea(iAmBanker){
    if(room.phase === 'betting'){
      if(iAmBanker){
        return `<div class="waiting-note">You're banking this round — sit tight while players bet.</div>`;
      }
      const myBet = room.bets[myId];
      if(myBet !== undefined){
        return `<div class="waiting-note">Bet placed: $${myBet}. Waiting on the table…</div>`;
      }
      return `
        <div>
          <div class="seat-label" style="text-align:center;">Place your bet</div>
          <div class="chip-row" id="chipRow">
            ${[1,2,3,4,5].map(v => `
              <button class="chip ${selectedChip===v?'selected':''}" data-val="${v}">
                <div class="chip-inner">$${v}</div>
              </button>`).join('')}
          </div>
          <div class="action-bar">
            <button class="btn btn-gold" id="betBtn" ${selectedChip?'':'disabled'}>Place bet</button>
          </div>
        </div>
      `;
    }

    if(room.phase === 'player_turns' && room.currentTurn === myId){
      const hands = room.hands[myId] || [];
      const activeIdx = room.activeHandIndex ? room.activeHandIndex[myId] : 0;
      const hand = hands[activeIdx];
      const canDouble = hand && hand.cards.length === 2 && !hand.doubled;
      const canSplit = hands.length === 1 && hand && hand.cards.length === 2 &&
        cardBaseValue(hand.cards[0]) === cardBaseValue(hand.cards[1]);
      const secs = remainingSeconds();
      return `
        <div>
          ${secs !== null ? `<div class="turn-timer ${secs<=5?'urgent':''}" id="turnTimerBadge">⏱ ${secs}s to act</div>` : ''}
          ${(canDouble || canSplit) ? `
            <div class="action-bar-secondary">
              ${canDouble ? `<button class="btn btn-ghost btn-sm" id="doubleBtn">Double Down</button>` : ''}
              ${canSplit ? `<button class="btn btn-ghost btn-sm" id="splitBtn">Split</button>` : ''}
            </div>` : ''}
          <div class="action-bar">
            <button class="btn btn-stand" id="standBtn">Stand</button>
            <button class="btn btn-hit" id="hitBtn">Hit</button>
          </div>
        </div>
      `;
    }

    if(room.phase === 'player_turns'){
      const secs = remainingSeconds();
      const waitName = room.players[room.currentTurn] ? room.players[room.currentTurn].name : 'the table';
      return `<div class="waiting-note">Waiting on ${waitName}…${secs !== null ? ` (<span id="waitingCountdownVal">${secs}</span>s)` : ''}</div>`;
    }

    if(room.phase === 'dealing'){
      return `<div class="waiting-note">Dealing…</div>`;
    }

    if(room.phase === 'banker_turn'){
      return `<div class="waiting-note">Banker is playing it out…</div>`;
    }

    if(room.phase === 'payout'){
      return `<div class="waiting-note">Round settled — next bets opening shortly…</div>`;
    }

    return '';
  }

  function renderToast(){
    if(!room.lastResults) return '';
    if(room.phase !== 'payout' && room.phase !== 'betting') return '';
    const mine = room.lastResults[myId];
    if(mine === undefined) return '';
    const sign = mine > 0 ? '+' : '';
    const label = mine > 0 ? 'You won' : mine < 0 ? 'You lost' : 'Push';
    return `<div class="toast">${label} ${mine !== 0 ? `$${Math.abs(mine).toFixed(2)}` : ''}</div>`;
  }

  function wireActionArea(iAmBanker){
    const chipRow = document.getElementById('chipRow');
    if(chipRow){
      chipRow.querySelectorAll('.chip').forEach(el => {
        el.onclick = () => { selectedChip = parseInt(el.dataset.val,10); render(); };
      });
    }
    const betBtn = document.getElementById('betBtn');
    if(betBtn){
      betBtn.onclick = () => {
        socket.emit('place_bet', { code: room.code, amount: selectedChip }, (res) => {
          if(res.ok){ selectedChip = null; }
        });
      };
    }
    const hitBtn = document.getElementById('hitBtn');
    if(hitBtn){ hitBtn.onclick = () => socket.emit('hit', { code: room.code }, (res) => { if(!res.ok) alert(res.error); }); }
    const standBtn = document.getElementById('standBtn');
    if(standBtn){ standBtn.onclick = () => socket.emit('stand', { code: room.code }, (res) => { if(!res.ok) alert(res.error); }); }
    const doubleBtn = document.getElementById('doubleBtn');
    if(doubleBtn){ doubleBtn.onclick = () => socket.emit('double', { code: room.code }, (res) => { if(!res.ok) alert(res.error); }); }
    const splitBtn = document.getElementById('splitBtn');
    if(splitBtn){ splitBtn.onclick = () => socket.emit('split', { code: room.code }, (res) => { if(!res.ok) alert(res.error); }); }
  }

  function render(){
    if(!room){ renderLobby(); return; }
    renderTable();
  }

  render();
})();
</script>
</body>
</html>
